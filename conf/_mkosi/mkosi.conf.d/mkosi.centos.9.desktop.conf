[Match]
#Distribution=rhel
#Distribution=fedora
Distribution=centos
#Distribution=alma
#Distribution=rocky
Environment=EDITION=desktop
#Release=general
Release=9
#Release=10
#Release=F43
#Release=F44

[Distribution]
Repositories=epel
RepositoryKeyCheck=no
RepositoryKeyFetch=yes

[Build]
WithNetwork=yes
WorkspaceDirectory=$SUDO_HOME/.workdirs/mkosi/%d-%r-%a-$EDITION/workdir/
PackageCacheDirectory=/srv/user/share/cache/%d-%r-%a
#SandboxTrees=repository/%d-backports-%r.sources:/etc/apt/sources.list.d/%d-%r-backports.sources
#CacheDirectory=/srv/user/share/cache/
#CacheKey=%d-%r-%a
#BuildSources=$SUDO_HOME/.workdirs/mkosi/%d-%r-%a/sources/
#BuildKey=%d-%r-%a

[Output]
#Format=disk
#Format=directory
Output=rootfs
OutputDirectory=$SUDO_HOME/.workdirs/mkosi/%d-%r-%a-$EDITION/outputs/

[Runtime]
Machine=pc-%d-%r-%a

[Validation]
SecureBoot=no

[Content]
RootPassword=r00t
#Autologin=yes
Locale=ja_JP.UTF-8
LocaleMessages=ja_JP.UTF-8
Keymap=jp
Timezone=Asia/Tokyo
Hostname=sv-%d.workgroup
RootShell=/bin/bash
WithRecommends=yes
SELinuxRelabel=no
Bootable=no
#SyncScripts=mkosi.builddir/add-backports.sh
#SyncScripts=base/add-backports.sh
