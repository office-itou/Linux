[Match]
Distribution=ubuntu
Environment=!EDITION=desktop
#Release=general
Release=jammy
#Release=noble
#Release=plucky
#Release=questing
#Release=resolute

[Distribution]
Repositories=main,restricted,universe,multiverse
RepositoryKeyCheck=no
RepositoryKeyFetch=yes

[Build]
WithNetwork=yes
WorkspaceDirectory=$SUDO_HOME/.workdirs/mkosi/%d-%r-%a-$EDITION/workdir/
PackageCacheDirectory=/srv/user/share/cache/%d-%r-%a
SandboxTrees=repository/apt-install-recommends:/etc/apt/apt.conf.d/apt-install-recommends
SandboxTrees=repository/%d-%r-backports.sources:/etc/apt/sources.list.d/%d-%r-backports.sources
#SandboxTrees=repository/%d-%r-backports.repo:/etc/yum.repos.d/%d-%r-backports.repo
#SandboxTrees=repository/%d-%r-sle.repo:/etc/yum.repos.d/%d-%r-sle.repo
#CacheDirectory=/srv/user/share/cache/
#CacheKey=%d-%r-%a
#BuildSources=$SUDO_HOME/.workdirs/mkosi/%d-%r-%a/sources/
#BuildKey=%d-%r-%a

[Output]
#Format=disk
#Format=directory
Output=rootfs
OutputDirectory=$SUDO_HOME/.workdirs/mkosi/%d-%r-%a-$EDITION/outputs/

[Runtime]
Machine=pc-%d-%r-%a

[Validation]
SecureBoot=no

[Content]
RootPassword=r00t
#Autologin=yes
Locale=ja_JP.UTF-8
LocaleMessages=ja_JP.UTF-8
Keymap=jp
Timezone=Asia/Tokyo
Hostname=sv-%d.workgroup
RootShell=/bin/bash
WithRecommends=yes
SELinuxRelabel=no
Bootable=no
