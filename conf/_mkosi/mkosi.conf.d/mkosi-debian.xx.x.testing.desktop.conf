# === Match ===================================================================
[Match]
Distribution=debian
#Release=bullseye
#Release=bookworm
#Release=trixie
#Release=forky
Release=testing
#Release=sid
#Release=experimental
Architecture=x86-64
Environment=EDITION=desktop

# === Distribution ============================================================
[Distribution]
RepositoryKeyCheck=no
RepositoryKeyFetch=yes
Repositories=main,contrib,non-free,non-free-firmware

# === Output ==================================================================
[Output]
#Output=rootfs
#OutputDirectory=$SUDO_HOME/.workdirs/mkosi/%d-%r-%a-$EDITION/outputs/
#Format=disk
#Format=directory
#CompressOutput=zstd

# === Build ===================================================================
[Build]
ToolsTree=yes
ToolsTreeDistribution=%d
ToolsTreeRelease=%r
#WorkspaceDirectory=$SUDO_HOME/.workdirs/mkosi/%d-%r-%a-$EDITION/workdir/
PackageCacheDirectory=/srv/user/share/cache/%d-%r-%a
WithNetwork=yes
SandboxTrees=repository/apt-conf:/etc/apt/apt.conf.d/apt-conf
SandboxTrees=repository/%d-%r-backports.sources:/etc/apt/sources.list.d/%d-%r-backports.sources
#CacheDirectory=/srv/user/share/cache/
#CacheKey=%d-%r-%a
#BuildSources=$SUDO_HOME/.workdirs/mkosi/%d-%r-%a-$EDITION/sources/
#BuildSources=$SUDO_HOME/.workdirs/mkosi/%d-%r-%a/sources/
#BuildKey=%d-%r-%a

# === Runtime =================================================================
[Runtime]
Machine=pc-%d-%r-%a

# === Validation ==============================================================
[Validation]
SecureBoot=no

# === Content =================================================================
[Content]
# --- user --------------------------------------------------------------------
RootPassword=r00t
#Autologin=yes
# --- locale ------------------------------------------------------------------
Locale=ja_JP.UTF-8
LocaleMessages=ja_JP.UTF-8
Keymap=jp
Timezone=Asia/Tokyo
# --- host --------------------------------------------------------------------
Hostname=sv-%d.workgroup
RootShell=/bin/bash
SELinuxRelabel=no
Bootable=no
