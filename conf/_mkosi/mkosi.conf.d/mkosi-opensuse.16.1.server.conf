# === Match ===================================================================
[Match]
Distribution=opensuse
#Release=15.6
#Release=16.0
Release=16.1
#Release=tumbleweed
Architecture=x86-64
Environment=EDITION=server
#Environment=EDITION=desktop

# === Distribution ============================================================
[Distribution]
RepositoryKeyCheck=no
RepositoryKeyFetch=yes
#Repositories=repo-backports-update,repo-sle-update

# === Output ==================================================================
[Output]
#Output=rootfs
#OutputDirectory=$SUDO_HOME/.workdirs/mkosi/%d-%r-%a-$EDITION/outputs/
#Format=disk
#Format=directory
#CompressOutput=zstd

# === Build ===================================================================
[Build]
ToolsTree=no
ToolsTreeDistribution=%d
ToolsTreeRelease=%r
#WorkspaceDirectory=$SUDO_HOME/.workdirs/mkosi/%d-%r-%a-$EDITION/workdir/
PackageCacheDirectory=/srv/user/share/cache/%d-%r-%a
WithNetwork=yes
#SandboxTrees=repository/%d-%r-backports.repo:/etc/zypp/repos.d/%d-%r-backports.repo
#SandboxTrees=repository/%d-%r-sle.repo:/etc/zypp/repos.d/%d-%r-sle.repo
#CacheDirectory=/srv/user/share/cache/
#CacheKey=%d-%r-%a
#BuildSources=$SUDO_HOME/.workdirs/mkosi/%d-%r-%a-$EDITION/sources/
#BuildSources=$SUDO_HOME/.workdirs/mkosi/%d-%r-%a/sources/
#BuildKey=%d-%r-%a

# === Runtime =================================================================
[Runtime]
Machine=pc-%d-%r-%a

# === Validation ==============================================================
[Validation]
SecureBoot=no

# === Content =================================================================
[Content]
# --- user --------------------------------------------------------------------
RootPassword=r00t
#Autologin=yes
# --- locale ------------------------------------------------------------------
Locale=ja_JP.UTF-8
LocaleMessages=ja_JP.UTF-8
Keymap=jp
Timezone=Asia/Tokyo
